server {
    listen 80;
    server_name menu2-stage.highhopesma.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name menu2-stage.highhopesma.com;

    ssl_certificate /etc/letsencrypt/live/menu2-stage.highhopesma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/menu2-stage.highhopesma.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/highhopes-menu-stage;
    index index.html;

    # Proxy /api to staging Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }
}
