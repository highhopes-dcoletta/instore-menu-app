<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High Hopes Menu</title>
    <script>
      // The app targets 1024px kiosk iPads — no responsive breakpoints.
      // On phones (shortest screen dimension < 600px), force the browser to
      // render at 1024px width so the full kiosk layout is visible, scaled down.
      // iPads (shortest dim >= 744px) and desktops keep device-width untouched.
      if (Math.min(screen.width, screen.height) < 600) {
        document.querySelector('meta[name="viewport"]').content = 'width=1024'
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
