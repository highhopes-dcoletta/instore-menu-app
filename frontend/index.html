<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024" />
    <title>High Hopes Menu</title>
    <script>
      // The app targets 1024px kiosk iPads in landscape. Phones keep
      // width=1024 so they see a scaled-down version. Tablets and
      // larger use their landscape dimension (capped at 1024) so the
      // layout renders at native size without scaling.
      // iOS reports screen.width as portrait width regardless of
      // orientation, so we use min/max to get the true dimensions.
      var sw = Math.min(screen.width, screen.height)   // portrait
      var lw = Math.max(screen.width, screen.height)   // landscape
      if (sw >= 768) {
        document.querySelector('meta[name="viewport"]').content =
          'width=' + Math.min(lw, 1024)
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
