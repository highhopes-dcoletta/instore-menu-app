<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024" />
    <title>High Hopes Menu</title>
    <script>
      // The app targets 1024px kiosk iPads. Phones (< 768px) keep
      // width=1024 so they see a scaled-down version. iPads and larger
      // use device-width to avoid unnecessary scaling (a standard iPad
      // at 768px was being shrunk to 75% with the forced 1024).
      // Cap at 1024 so ultra-wide screens don't stretch the layout.
      var sw = window.screen.width
      if (sw >= 768) {
        document.querySelector('meta[name="viewport"]').content =
          'width=' + Math.min(sw, 1024)
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
