name: E2E Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:          # allow manual runs

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: monitor/package-lock.json

      - name: Install dependencies
        working-directory: monitor
        run: npm ci

      - name: Install Playwright browsers
        working-directory: monitor
        run: npx playwright install chromium --with-deps

      - name: Run E2E checks
        id: e2e
        working-directory: monitor
        run: npm test -- --reporter=line
        continue-on-error: true

      - name: Send alert on failure
        if: steps.e2e.outcome == 'failure'
        run: |
          curl -sf -X POST "https://api.sendgrid.com/v3/mail/send" \
            -H "Authorization: Bearer ${{ secrets.SENDGRID_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "personalizations": [{"to": [{"email": "david.coletta@high-hopes.biz"}]}],
              "from": {"email": "david.coletta@high-hopes.biz"},
              "subject": "[ALERT] menu2.highhopesma.com E2E check failed",
              "content": [{
                "type": "text/plain",
                "value": "The browser-based E2E check for menu2.highhopesma.com failed.\n\nSee the full run at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }'

      - name: Upload failure screenshots
        if: steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: monitor/test-results/
          retention-days: 7

      - name: Fail the job if tests failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1
