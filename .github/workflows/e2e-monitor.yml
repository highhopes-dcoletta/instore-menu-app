name: E2E Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:          # allow manual runs

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: monitor/package-lock.json

      - name: Install dependencies
        working-directory: monitor
        run: npm ci

      - name: Install Playwright browsers
        working-directory: monitor
        run: npx playwright install chromium --with-deps

      - name: Run E2E checks
        id: e2e
        working-directory: monitor
        run: npm test -- --reporter=line
        continue-on-error: true

      - name: Send alert on failure
        if: steps.e2e.outcome == 'failure'
        run: |
          curl -sf -X POST "${{ secrets.PAGERTREE_INTEGRATION_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"event_type\": \"create\",
              \"Id\": \"e2e-monitor-${{ github.run_id }}\",
              \"Title\": \"menu2.highhopesma.com E2E check failed\",
              \"Description\": \"Playwright e2e tests failed. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

      - name: Upload failure screenshots
        if: steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v5
        with:
          name: screenshots
          path: monitor/test-results/
          retention-days: 7

      - name: Fail the job if tests failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1
